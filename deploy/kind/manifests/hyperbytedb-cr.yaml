# HyperbyteDB cluster for kind — tuned for a 4-CPU / high-memory node (16 GiB pod limit).
# Matches docker-compose tuning: chDB pool = cores, larger flush batches, faster WAL drain.
apiVersion: hyperbytedb.hyperbytedb.io/v1alpha1
kind: HyperbytedbCluster
metadata:
  name: hyperbytedb
  namespace: hyperbytedb
spec:
  replicas: 2
  image: hyperbytedb:local
  imagePullPolicy: Never
  server:
    port: 8086
    maxBodySizeBytes: 26214400
    requestTimeoutSecs: 30
    queryTimeoutSecs: 30
    # ≥ chdb.poolSize; caps concurrent query tasks on the Tokio blocking pool.
    maxConcurrentQueries: 32
  storage:
    volumeClaimTemplate:
      size: 32Gi
  chdb:
    # One chDB connection per CPU — parallel flush inserts and queries.
    poolSize: 4
  flush:
    intervalSecs: 5
    walSizeThresholdMb: 256
    timeBucketDuration: "1h"
    maxPointsPerBatch: 100000
    walBatchSize: 128
    walBatchDelayUs: 0
  retention:
    enabled: true
    interval: 12h
  cardinality:
    maxTagValuesPerMeasurement: 100000
    maxMeasurementsPerDatabase: 10000
  cluster:
    heartbeatIntervalSecs: 2
    heartbeatMissThreshold: 5
    replicationMaxRetries: 5
    replicationQueueDepth: 8192
    replicationMaxInflightBatches: 4
    replicationMaxCoalesceBodyBytes: 8388608
    replicateReceiverQueueDepth: 1024
    replicationTruncateStalePeerMultiplier: 2
    # Heartbeat RPC timeout must exceed typical flush/chDB stalls (~3s at 500k pts).
    raftHeartbeatIntervalMs: 1000
    raftElectionTimeoutMs: 5000
    raftSnapshotThreshold: 1000
    replication:
      mode: async
      ackTimeoutMs: 5000
      syncQuorum:
        minAcks: majority
  statementSummary:
    enabled: true
    maxEntries: 1000
  hintedHandoff:
    enabled: true
    maxHintsPerPeer: 100000
    maxHintAgeSecs: 3600
  rateLimit:
    enabled: false
    maxRequestsPerSecond: 0
  logging:
    level: info
    format: json
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 16Gi
  # Health-aware reverse proxy (TiProxy-style). Sits in front of the
  # StatefulSet so rolling restarts and per-pod drains don't surface as
  # client-visible 503s. Clients in kind talk to the proxy via the
  # `hyperbytedb-proxy` NodePort, which is mapped to host port 8086 by
  # `deploy/kind/kind-config.yaml`.
  proxy:
    enabled: true
    image: hyperbytedb-proxy:local
    imagePullPolicy: Never
    replicas: 2
    port: 8086
    serviceType: NodePort
    nodePort: 30086
    healthPath: /health
    holdTimeoutSecs: 10
    maxRetries: 2
    shutdownGraceSecs: 30
    requestTimeoutSecs: 60
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: "1"
        memory: 256Mi
