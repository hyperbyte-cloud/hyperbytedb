---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: hyperbytedb

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: hyperbytedb

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hyperbytedb
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    scrape_configs:
      - job_name: "hyperbytedb"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "hyperbytedb-0.hyperbytedb-headless:8086"
              - "hyperbytedb-1.hyperbytedb-headless:8086"
              - "hyperbytedb-2.hyperbytedb-headless:8086"
  hyperbytedb-alerts.yml: |
    groups:
      - name: hyperbytedb
        interval: 30s
        rules:
          - alert: HyperbytedbInstanceDown
            expr: up{job="hyperbytedb"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "HyperbyteDB instance {{ $labels.instance }} is down"
              description: "Instance {{ $labels.instance }} has been unreachable for more than 1 minute."
          - alert: HyperbytedbWriteErrors
            expr: rate(hyperbytedb_write_errors_total[5m]) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "HyperbyteDB write errors detected"
              description: "Write errors on {{ $labels.instance }}: {{ $value }} errors/s over 5m."
          - alert: HyperbytedbQueryErrors
            expr: rate(hyperbytedb_query_errors_total[5m]) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "HyperbyteDB query errors detected"
              description: "Query errors on {{ $labels.instance }}: {{ $value }} errors/s over 5m."
          - alert: HyperbytedbSlowQueries
            expr: histogram_quantile(0.99, rate(hyperbytedb_query_duration_seconds_bucket[5m])) > 10
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "HyperbyteDB P99 query latency exceeds 10s"
              description: "P99 query latency on {{ $labels.instance }} is {{ $value }}s."
          - alert: HyperbytedbFlushErrors
            expr: rate(hyperbytedb_flush_errors_total[5m]) > 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "HyperbyteDB flush errors detected"
              description: "WAL-to-chDB flush is failing on {{ $labels.instance }}: {{ $value }} errors/s over 5m."
          - alert: HyperbytedbSlowFlushes
            expr: histogram_quantile(0.99, rate(hyperbytedb_flush_duration_seconds_bucket[5m])) > 30
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "HyperbyteDB P99 flush latency exceeds 30s"
              description: "P99 flush latency on {{ $labels.instance }} is {{ $value }}s."
          - alert: HyperbytedbReplicationErrors
            expr: rate(hyperbytedb_replication_errors_total[5m]) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "HyperbyteDB replication errors detected"
              description: "Replication errors on {{ $labels.instance }}: {{ $value }} errors/s over 5m."
          - alert: HyperbytedbNodeNotActive
            expr: hyperbytedb_cluster_node_state != 3
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "HyperbyteDB node is not active"
              description: "Node {{ $labels.instance }} is in state {{ $value }} (expected 3=Active)."
          - alert: HyperbytedbPeerCountLow
            expr: hyperbytedb_cluster_peers_active < 2
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "HyperbyteDB cluster has fewer than 2 active peers"
              description: "Node {{ $labels.instance }} has {{ $value }} active peers."
          - alert: HyperbytedbWALGrowing
            expr: hyperbytedb_wal_last_sequence - hyperbytedb_flush_points_total > 100000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "HyperbyteDB WAL backlog is growing"
              description: "WAL sequence is {{ $value }} points ahead of flushed on {{ $labels.instance }}."

      - job_name: "hyperbytedb-proxy"
        metrics_path: "/metrics"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - hyperbytedb
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: hyperbytedb-proxy
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1:8086
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: instance

      - job_name: "kube-state-metrics"
        static_configs:
          - targets:
              - "kube-state-metrics.hyperbytedb.svc:8080"

      - job_name: "cadvisor"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        metrics_path: /metrics/cadvisor
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      - job_name: "kubelet"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hyperbytedb
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      automountServiceAccountToken: true
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=30d"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: rules
              mountPath: /etc/prometheus/rules
              readOnly: true
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: hyperbytedb-alerts.yml
                path: hyperbytedb-alerts.yml
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: hyperbytedb
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
