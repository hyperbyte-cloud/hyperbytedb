apiVersion: 1

datasources:
  - name: HyperbyteDB
    type: influxdb
    access: proxy
    url: http://hyperbytedb:8086
    database: telegraf
    isDefault: true
    editable: true

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    editable: true
    jsonData:
      maxLines: 1000
