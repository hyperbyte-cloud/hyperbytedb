services:
  hyperbytedb:
    build:
      context: ..
      dockerfile: hyperbytedb/Dockerfile
    container_name: hyperbytedb
    ports:
      - "8086:8086"
    volumes:
      - hyperbytedb-data:/var/lib/hyperbytedb
    environment:
      HYPERBYTEDB__SERVER__BIND_ADDRESS: "0.0.0.0"
      HYPERBYTEDB__SERVER__PORT: "8086"
      HYPERBYTEDB__LOGGING__LEVEL: "info"
      HYPERBYTEDB__LOGGING__FORMAT: "json"
      HYPERBYTEDB__LOGGING__DETAILED_TRACE: "true"
      HYPERBYTEDB__LOGGING__OTLP_ENDPOINT: "http://alloy:4318"
      HYPERBYTEDB__LOGGING__OTLP_SAMPLE_RATIO: "1.0"
      HYPERBYTEDB__FLUSH__INTERVAL_SECS: "10"
      HYPERBYTEDB__STATEMENT_SUMMARY__ENABLED: "true"
    networks:
      - hyperbytedb-net
    depends_on:
      alloy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  alloy:
    image: grafana/alloy:v1.7.5
    container_name: alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./deploy/compose/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "4318:4318"
    networks:
      - hyperbytedb-net
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./deploy/compose/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - hyperbytedb-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    command:
      - -config.file=/etc/tempo/tempo.yaml
      - -target=all
    volumes:
      - ./deploy/compose/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - hyperbytedb-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    depends_on:
      hyperbytedb:
        condition: service_healthy
    volumes:
      - ./deploy/compose/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
    networks:
      - hyperbytedb-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      hyperbytedb:
        condition: service_healthy
    networks:
      - hyperbytedb-net

  grafana:
    image: grafana/grafana:12.4.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      hyperbytedb:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - hyperbytedb-net

volumes:
  hyperbytedb-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  alloy-data:

networks:
  hyperbytedb-net:
    driver: bridge
